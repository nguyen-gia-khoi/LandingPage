server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/xml
        application/json application/rss+xml application/atom+xml
        image/svg+xml;

    # ── Static assets — cache 1 năm (content hash đổi khi file đổi) ─────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── SPA routing — mọi route đều trả về index.html ───────────────────────
    # Giải quyết vấn đề F5/refresh trên route như /about, /projects
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 404 custom page ──────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Tắt log cho favicon và robots ────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Bảo mật cơ bản ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
