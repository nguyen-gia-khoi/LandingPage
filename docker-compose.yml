services:

  # ── Reverse Proxy ─────────────────────────────────────────────
  reverse_proxy:
    image: traefik:v3.7
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── Production ────────────────────────────────────────────────
  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: ngk-landing-prod
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prod.rule=Host(`nguyengiakhoi.io.vn`)"
      - "traefik.http.services.prod.loadbalancer.server.port=80"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Development ───────────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ngk-landing-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped